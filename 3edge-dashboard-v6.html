    --bd:#d0d5de;--bd2:#b8bfcc;--bd3:#a0a8b8;

    --cond:'Montserrat',sans-serif;
    --body:'Montserrat',sans-serif;
    --hdr:#111418;
  }
  html,body{background:var(--bg);color:var(--t1);font-family:var(--body);min-height:100vh}
  body{
    background-image:
      linear-gradient(rgba(42,158,42,0.06) 1px,transparent 1px),
      linear-gradient(90deg,rgba(42,158,42,0.06) 1px,transparent 1px);
    background-size:80px 80px;
  }
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:var(--s0)}
  ::-webkit-scrollbar-thumb{background:var(--bd3);border-radius:2px}
  input,select,textarea{
    background:var(--s2);border:1px solid var(--bd);color:var(--t1);
    padding:8px 11px;font-family:var(--mono);font-size:11px;
    border-radius:2px;outline:none;width:100%;transition:border-color .15s;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--3eg)}
  input::placeholder{color:var(--t4)}
  select option{background:var(--s3)}
  textarea{resize:vertical;min-height:76px;line-height:1.7}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideIn{from{transform:translateX(36px);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes expandRow{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .fade{animation:fadeUp .2s ease forwards}
  .pulse{animation:pulse 2.5s infinite}
  tr.ewo-row td{animation:expandRow .18s ease forwards}
  button{cursor:pointer}
</style>
